# Datasource — credenciales exclusivas al schema `course` (Shared DB, schema-per-service)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:course_user}
quarkus.datasource.password=${DB_PASSWORD:course_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edutrack}

# Hibernate ORM: el DDL lo gestiona exclusivamente Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.default-schema=course

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=course
quarkus.flyway.locations=classpath:db/migration

# Dev valida que el mapeo JPA coincide exactamente con el DDL de Flyway
%dev.quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# Test: Flyway crea el schema, Hibernate solo valida
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.flyway.migrate-at-start=true

# Auth proactiva deshabilitada: la identidad la propaga el Gateway por cabeceras
quarkus.http.auth.proactive=false

# Interpretacion de cabeceras internas propagadas por el Gateway (RequestHeaders).
# EAGER: header presente pero malformado => 400 Bad Request.
# WARN : header presente pero malformado => se loguea WARN y se trata como ausente.
edutrack.headers.validation.mode=EAGER

# Exposicion de stack trace en el body de errores (GlobalExceptionMappers).
edutrack.errors.expose-stacktrace=false

# Discovery local (docker-compose): el contenedor se llama "auth", no "edutrack-auth".
%dev.edutrack.discovery.pattern={service}:8080

# OpenAPI / Swagger UI — servidos bajo /course/ (el Gateway enruta por 1er segmento).
quarkus.smallrye-openapi.always-include-in-prod=true
quarkus.smallrye-openapi.auto-add-security=false
quarkus.smallrye-openapi.path=/course/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/course/q/swagger-ui
quarkus.swagger-ui.title=EduTrack Course Service API
